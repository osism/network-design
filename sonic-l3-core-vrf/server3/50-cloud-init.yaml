# This file is generated from information provided by the datasource.  Changes
# to it will not persist across an instance reboot.  To disable cloud-init's
# network configuration capabilities, write a file
# /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg with the following:
# network: {config: disabled}
network:
  dummy-devices:
    loopback0:
        addresses:
        - 10.10.0.122/32
        - 2001:db8:1000:0:10:10:0:122/128
        mtu: 9100

  ethernets:
      ens18:
        dhcp4: true
      data1:
        dhcp4: false
        dhcp6: false
        link-local:
          - ipv6
        mtu: 9100
        match:
          macaddress: bc:24:11:17:17:a2
        set-name: data1
      data2:
        dhcp4: false
        dhcp6: false
        link-local:
          - ipv6
        mtu: 9100
        match:
          macaddress: bc:24:11:64:95:a5
        set-name: data2

  version: 2
